<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>八星磁場分析 - Apple Pro Edition</title>
    <style>
        /* === 定義顏色變數 (預設 Light Mode) === */
        :root {
            --bg-color: #F2F2F7; 
            --card-bg: #FFFFFF;
            --accent-color: #007AFF; 
            --text-primary: #1C1C1E;
            --text-secondary: #8E8E93;
            --text-tertiary: #C7C7CC;
            --divider-color: rgba(60, 60, 67, 0.1);
            --input-bg: rgba(118, 118, 128, 0.08);
            --picker-bg: rgba(118, 118, 128, 0.12);
            --preview-bg: rgba(255, 255, 255, 0.5); 
            --footer-bg: rgba(242, 242, 247, 0.85);
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.05), 0 2px 8px rgba(0,0,0,0.04);
            --shadow-lg: 0 -4px 20px rgba(0,0,0,0.06);
            --shadow-inset: inset 0 1px 4px rgba(0,0,0,0.06);
            --hint-bg: rgba(0, 122, 255, 0.1); 
            --danger-bg: rgba(255, 59, 48, 0.1);
        }

        /* === 深色模式變數 === */
        [data-theme="dark"] {
            --bg-color: #000000;
            --card-bg: #1C1C1E;
            --text-primary: #FFFFFF;
            --text-secondary: #8E8E93;
            --text-tertiary: #48484A;
            --divider-color: rgba(84, 84, 88, 0.65);
            --input-bg: rgba(118, 118, 128, 0.24);
            --picker-bg: rgba(118, 118, 128, 0.24);
            --preview-bg: rgba(0, 0, 0, 0.3); 
            --footer-bg: rgba(0, 0, 0, 0.85);
            --shadow-sm: 0 1px 4px rgba(0,0,0,0.2);
            --shadow-lg: 0 -4px 24px rgba(0,0,0,0.4);
            --shadow-inset: inset 0 1px 5px rgba(0,0,0,0.4);
            --hint-bg: rgba(10, 132, 255, 0.15); 
            --danger-bg: rgba(255, 69, 58, 0.15);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            display: flex;
            justify-content: center;
            height: 100vh; 
            height: 100dvh; 
            overflow: hidden; 
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .app-container {
            width: 100%;
            max-width: 440px;
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
            overflow: hidden;
        }

        /* ========== 頂部控制區 (左右對稱統一佈局) ========== */
        .top-left-controls {
            position: absolute;
            top: 14px;
            left: 16px;
            display: flex;
            gap: 8px;
            z-index: 20;
        }

        .top-right-controls {
            position: absolute;
            top: 14px;
            right: 16px;
            display: flex;
            gap: 8px;
            z-index: 20;
        }
        
        .icon-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--input-bg);
            border: none;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s, color 0.2s;
            color: var(--text-primary);
        }
        .icon-btn:active { transform: scale(0.9); }
        .icon-btn.active { background: var(--accent-color); color: #FFFFFF; }

        .top-section {
            flex-shrink: 0;
            padding: 16px 16px 8px 16px;
            background: var(--bg-color);
            z-index: 10;
        }

        .header { 
            display: flex; 
            align-items: baseline; 
            justify-content: center; 
            gap: 8px; 
            margin-bottom: 12px; 
            margin-top: 4px; 
        }
        .header h1 { font-size: 20px; font-weight: 700; letter-spacing: 0.3px; margin: 0; }
        .header p { color: var(--text-secondary); font-size: 11px; font-weight: 500; margin: 0; }

        .input-card {
            background: var(--card-bg);
            padding: 8px;
            border-radius: 14px;
            box-shadow: var(--shadow-sm);
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        input {
            width: 100%;
            border: none;
            background: var(--input-bg);
            padding: 12px 36px 12px 12px; 
            font-size: 22px;
            border-radius: 10px;
            outline: none;
            text-align: center;
            font-weight: 600;
            color: var(--text-primary);
            transition: background 0.2s;
        }
        input:focus { filter: brightness(0.95); }
        input::placeholder { color: #A1A1A6; font-weight: 500; }

        .clear-btn {
            position: absolute;
            right: 10px;
            width: 24px;
            height: 24px;
            background: var(--text-tertiary);
            color: #FFF;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: none; 
            user-select: none;
            transition: opacity 0.2s;
        }
        .clear-btn:active { opacity: 0.7; }

        /* ========== 中間滑動區 ========== */
        .scroll-area {
            flex-grow: 1;
            overflow-y: auto;
            padding: 4px 16px;
            scrollbar-width: none;
        }
        .scroll-area::-webkit-scrollbar { display: none; }

        /* === 智慧配號 面板 === */
        .builder-panel {
            background: var(--card-bg);
            border-radius: 14px;
            padding: 12px 14px;
            box-shadow: var(--shadow-sm);
            display: none; 
            flex-direction: column;
            margin-bottom: 12px;
            animation: slideDown 0.3s ease forwards;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .builder-row { display: flex; justify-content: space-between; align-items: center; }
        .builder-label { font-size: 12px; font-weight: 600; color: var(--text-secondary); }
        .builder-input-small {
            width: 50px; background: var(--input-bg); border: none; padding: 6px 8px; border-radius: 8px;
            color: var(--text-primary); font-weight: bold; text-align: center; outline: none; font-size: 14px;
        }
        .star-pills { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
        .pill {
            padding: 6px 10px; border-radius: 10px; font-size: 11px; font-weight: 700; cursor: pointer;
            border: 1px solid transparent; transition: all 0.2s; user-select: none;
        }
        .pill.inactive { background: transparent !important; border-color: var(--divider-color) !important; color: var(--text-tertiary) !important; }
        
        .builder-suggestions {
            margin-top: 12px; background: var(--hint-bg); border-radius: 10px; padding: 10px;
            font-size: 12px; color: var(--text-primary); line-height: 1.6; font-weight: 500; display: none;
        }
        .suggest-btn {
            display: inline-block; padding: 2px 8px; margin: 2px 4px 2px 0; background: var(--card-bg);
            border-radius: 6px; border: 1px solid var(--divider-color); cursor: pointer;
            font-weight: 700; box-shadow: var(--shadow-sm); transition: transform 0.1s;
        }
        .suggest-btn:active { transform: scale(0.92); }

        .conversion-hint {
            font-size: 12px; color: var(--accent-color); background: var(--hint-bg);
            padding: 8px 12px; border-radius: 10px; text-align: center; margin-bottom: 12px;
            font-weight: 600; display: none; 
        }

        /* 迷你卡片排版 */
        #resultList {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 12px;
            align-items: start;
        }

        .result-item {
            background: var(--card-bg);
            padding: 8px 10px;
            border-radius: 10px;
            box-shadow: var(--shadow-sm);
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
            overflow: hidden;
        }
        .result-item:active { transform: scale(0.96); }

        .card-row { display: flex; justify-content: space-between; align-items: baseline; width: 100%; }
        
        /* 處理數字與修飾詞重疊的佈局 */
        .card-row.top-row {
            display: flex; flex-wrap: nowrap; align-items: center; justify-content: flex-start; gap: 4px; overflow: hidden;
        }

        .num-tag { 
            font-size: 16px; font-weight: 700; color: var(--text-primary); 
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 1;
        }
        
        .num-modifier { 
            font-size: 10px; color: var(--accent-color); font-weight: 700; flex-shrink: 0;
            background: var(--hint-bg); padding: 2px 6px; border-radius: 6px;
        }

        /* 點擊展開後的樣式 */
        .result-item.expanded .card-row.top-row { flex-wrap: wrap; }
        .result-item.expanded .num-tag { white-space: normal; word-break: break-all; overflow: visible; }

        .star-name { font-size: 13px; font-weight: 600; color: var(--text-secondary); display: flex; align-items: baseline; gap: 4px; }
        .star-level { font-size: 10px; font-weight: 500; opacity: 0.8; }
        .star-type { font-size: 11px; font-weight: 700; }

        /* 單行統計卡片 */
        .stats-card {
            background: var(--card-bg); border-radius: 12px; box-shadow: var(--shadow-sm); padding: 12px 14px;
            display: none; flex-direction: row; justify-content: space-between; align-items: center;
            margin-bottom: 16px; font-size: 12px; font-weight: 600;
        }
        .stats-text-primary { color: var(--text-primary); }
        .stats-text-secondary { color: var(--text-secondary); }

        /* ========== 歷史紀錄面板 ========== */
        .history-panel {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color); z-index: 100;
            display: flex; flex-direction: column;
            transform: translateX(-100%); transition: transform 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
        }
        .history-panel.show { transform: translateX(0); }
        
        .history-header {
            flex-shrink: 0; padding: 16px 20px;
            display: flex; justify-content: space-between; align-items: center;
            background: var(--card-bg); border-bottom: 1px solid var(--divider-color);
            box-shadow: var(--shadow-sm);
        }
        .history-title { font-size: 18px; font-weight: 700; color: var(--text-primary); margin: 0; }
        .close-history-btn {
            background: var(--input-bg); border: none; width: 32px; height: 32px;
            border-radius: 16px; font-weight: bold; color: var(--text-primary); cursor: pointer;
        }
        
        .history-list { flex-grow: 1; overflow-y: auto; padding: 16px; }
        
        .history-item {
            background: var(--card-bg); border-radius: 12px; padding: 14px 16px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: var(--shadow-sm); cursor: pointer; transition: transform 0.1s;
        }
        .history-item:active { transform: scale(0.98); }
        .history-text { font-size: 16px; font-weight: 600; color: var(--text-primary); word-break: break-all; margin-right: 12px; }
        
        .history-del-btn {
            background: var(--danger-bg); color: #FF3B30; border: none; width: 28px; height: 28px;
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            font-size: 14px; cursor: pointer; flex-shrink: 0; transition: background 0.2s;
        }
        .history-del-btn:active { opacity: 0.7; }
        
        .clear-all-btn {
            background: var(--danger-bg); color: #FF3B30; border: none; padding: 6px 12px;
            border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity 0.2s;
        }
        .clear-all-btn:active { opacity: 0.7; }
        .empty-history { text-align: center; color: var(--text-secondary); font-size: 14px; margin-top: 40px; font-weight: 500; }

        /* ========== 底部操作區 ========== */
        .footer-action {
            flex-shrink: 0; 
            padding: 10px 16px calc(10px + env(safe-area-inset-bottom)) 16px; 
            background: var(--footer-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--divider-color); display: flex; flex-direction: column;
            gap: 8px; box-shadow: var(--shadow-lg); z-index: 10;
        }

        .action-row { display: flex; gap: 8px; width: 100%; align-items: stretch; height: 44px; }
        .select-wrapper { position: relative; flex: 1; min-width: 0; }
        .mode-select {
            width: 100%; height: 100%; background: var(--picker-bg); color: var(--text-primary);
            border: none; padding: 0 30px 0 14px; border-radius: 10px; font-size: 14px;
            font-weight: 600; appearance: none; -webkit-appearance: none; text-align: left; outline: none; cursor: pointer;
        }
        .select-wrapper::after {
            content: '▼'; position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
            font-size: 10px; color: var(--text-secondary); pointer-events: none;
        }

        .copy-btn {
            background: var(--accent-color); color: white; border: none; border-radius: 10px;
            font-size: 15px; font-weight: 600; cursor: pointer; width: 90px; flex-shrink: 0;
            transition: transform 0.1s, background-color 0.2s;
        }
        .copy-btn:active { transform: scale(0.95); background: #0062CC; }

        .preview-box {
            background: var(--preview-bg); border: 1px solid var(--divider-color); border-radius: 8px;
            padding: 8px 10px; max-height: 54px; overflow-y: auto; box-shadow: var(--shadow-inset); display: none; 
        }
        .preview-text { font-size: 11px; color: var(--text-primary); font-weight: 500; line-height: 1.4; white-space: pre-wrap; word-break: break-all; text-align: left; }

        /* Toast 提示框 */
        .toast-message {
            position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%) scale(0.9);
            background: rgba(28, 28, 30, 0.85); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            color: #FFFFFF; padding: 14px 20px; border-radius: 16px; font-size: 14px; font-weight: 500;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2); z-index: 9999; opacity: 0; pointer-events: none; 
            white-space: nowrap; transition: opacity 0.3s cubic-bezier(0.25, 0.1, 0.25, 1), transform 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
        }
        .toast-message.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    </style>
</head>
<body>

<div class="app-container">
    
    <!-- 歷史紀錄面板 -->
    <div id="historyPanel" class="history-panel">
        <div class="history-header">
            <h2 class="history-title">搜尋紀錄</h2>
            <div>
                <button class="clear-all-btn" onclick="clearAllHistory()">清除全部</button>
                <button class="close-history-btn" onclick="toggleHistory()" style="margin-left: 10px;">✕</button>
            </div>
        </div>
        <div id="historyList" class="history-list"></div>
    </div>

    <!-- 頂部控制區 (完全對稱對齊) -->
    <div class="top-left-controls">
        <button class="icon-btn" onclick="toggleHistory()" title="搜尋歷史">🕒</button>
    </div>
    <div class="top-right-controls">
        <button class="icon-btn" id="builderToggleBtn" onclick="toggleBuilder()" title="開啟智慧選號模式">🎯</button>
        <button class="icon-btn" id="themeToggleBtn" onclick="toggleTheme()" title="切換深淺模式">🌙</button>
    </div>

    <div class="top-section">
        <div class="header">
            <h1>數字磁場分析</h1>
            <p>Pro Edition</p>
        </div>
        
        <div class="input-card">
            <div class="input-wrapper">
                <input type="text" id="numInput" placeholder="輸入號碼 (支援車牌/英文名)" value="">
                <div class="clear-btn" id="clearBtn" onclick="clearInput()">✕</div>
            </div>
        </div>
    </div>

    <div class="scroll-area">
        <div id="builderPanel" class="builder-panel">
            <div class="builder-row">
                <span class="builder-label">限制目標長度 (字數)</span>
                <input type="number" id="builderMaxLen" value="8" min="2" max="20" class="builder-input-small" onchange="updateAnalysis()">
            </div>
            <div class="builder-label" style="margin-top: 12px; margin-bottom: 2px;">允許產生的磁場 (點擊勾選)</div>
            <div class="star-pills" id="starPills"></div>
            <div id="builderSuggestions" class="builder-suggestions"></div>
        </div>

        <div id="conversionHint" class="conversion-hint"></div>
        <div id="resultList"></div>
        
        <div id="statsArea" class="stats-card">
            <span class="stats-text-primary" id="statRatio">📊 吉 0% / 凶 0%</span>
            <span class="stats-text-secondary" id="statFlow">🔄 -</span>
        </div>
    </div>

    <div class="footer-action" id="copyArea">
        <div class="action-row">
            <div class="select-wrapper">
                <select id="modeSelect" class="mode-select" onchange="setCopyMode(this.value)">
                    <option value="ai">模式：AI 專業</option>
                    <option value="client">模式：客戶簡報</option>
                    <option value="numbers">模式：純數字</option>
                </select>
            </div>
            <button class="copy-btn" onclick="copyResult()">複製</button>
        </div>
        
        <div id="previewContainer" class="preview-box">
            <div id="formattedText" class="preview-text"></div>
        </div>
    </div>
</div>

<script>
    const stars = {
        "天醫": { levels: { "1級": ["13","31"], "2級": ["68","86"], "3級": ["49","94"], "4級": ["27","72"] }, color: "#FF2D55", type: "吉" },
        "生氣": { levels: { "1級": ["14","41"], "2級": ["67","76"], "3級": ["39","93"], "4級": ["28","82"] }, color: "#34C759", type: "吉" },
        "延年": { levels: { "1級": ["19","91"], "2級": ["78","87"], "3級": ["34","43"], "4級": ["26","62"] }, color: "#FF9500", type: "吉" },
        "伏位": { levels: { "1級": ["11","22"], "2級": ["88","99"], "3級": ["66","77"], "4級": ["33","44"] }, color: "#32ADE6", type: "吉" },
        "絕命": { levels: { "1級": ["12","21"], "2級": ["69","96"], "3級": ["48","84"], "4級": ["37","73"] }, color: "var(--text-primary)", type: "凶" },
        "五鬼": { levels: { "1級": ["18","81"], "2級": ["79","97"], "3級": ["36","63"], "4級": ["24","42"] }, color: "#5856D6", type: "凶" },
        "六煞": { levels: { "1級": ["16","61"], "2級": ["47","74"], "3級": ["38","83"], "4級": ["29","92"] }, color: "#AF52DE", type: "凶" },
        "禍害": { levels: { "1級": ["17","71"], "2級": ["89","98"], "3級": ["46","64"], "4級": ["23","32"] }, color: "#FFCC00", type: "凶" }
    };

    const letterMap = {
        'A':1, 'B':2, 'C':3, 'D':4, 'E':5, 'F':6, 'G':7, 'H':8, 'I':9,
        'J':1, 'K':2, 'L':3, 'M':4, 'N':5, 'O':6, 'P':7, 'Q':8, 'R':9,
        'S':1, 'T':2, 'U':3, 'V':4, 'W':5, 'X':6, 'Y':7, 'Z':8
    };

    const input = document.getElementById('numInput');
    const clearBtn = document.getElementById('clearBtn');
    const list = document.getElementById('resultList');
    const statsArea = document.getElementById('statsArea');
    const previewContainer = document.getElementById('previewContainer');
    const formattedDisplay = document.getElementById('formattedText');
    const conversionHint = document.getElementById('conversionHint');
    
    let currentMode = 'ai'; 
    let currentCopyTexts = { ai: '', client: '', numbers: '' };
    
    let builderActive = false;
    let activeStars = ['天醫', '生氣', '延年', '伏位'];
    let prevValidRaw = ''; 
    let saveHistoryTimeout = null;
    let searchHistory = JSON.parse(localStorage.getItem('magnetic_history') || '[]');

    renderHistory();

    function toggleTheme() {
        triggerHaptic();
        const html = document.documentElement;
        const currentTheme = html.getAttribute('data-theme');
        const btn = document.getElementById('themeToggleBtn');
        
        if (currentTheme === 'dark') {
            html.removeAttribute('data-theme');
            btn.innerHTML = '🌙'; 
        } else {
            html.setAttribute('data-theme', 'dark');
            btn.innerHTML = '☀️'; 
        }
        if (builderActive) renderPills();
    }

    function triggerHaptic() {
        if (window.navigator && window.navigator.vibrate) window.navigator.vibrate(10);
    }

    /* === 歷史紀錄控制 === */
    function toggleHistory() {
        triggerHaptic();
        const panel = document.getElementById('historyPanel');
        panel.classList.toggle('show');
    }

    function saveToHistory(val) {
        let cleanVal = val.trim();
        if (!cleanVal || cleanVal.length < 2) return;
        
        searchHistory = searchHistory.filter(item => item !== cleanVal);
        searchHistory.unshift(cleanVal);
        
        if (searchHistory.length > 50) searchHistory.pop();
        
        localStorage.setItem('magnetic_history', JSON.stringify(searchHistory));
        renderHistory();
    }

    function loadHistoryItem(val) {
        input.value = val;
        toggleHistory();
        updateAnalysis();
    }

    function deleteHistoryItem(event, val) {
        event.stopPropagation(); 
        searchHistory = searchHistory.filter(item => item !== val);
        localStorage.setItem('magnetic_history', JSON.stringify(searchHistory));
        renderHistory();
    }

    function clearAllHistory() {
        if(confirm("確定要刪除所有搜尋紀錄嗎？")) {
            searchHistory = [];
            localStorage.setItem('magnetic_history', '[]');
            renderHistory();
        }
    }

    function renderHistory() {
        const listDiv = document.getElementById('historyList');
        if (searchHistory.length === 0) {
            listDiv.innerHTML = '<div class="empty-history">暫無紀錄</div>';
            return;
        }
        listDiv.innerHTML = searchHistory.map(item => `
            <div class="history-item" onclick="loadHistoryItem('${item}')">
                <span class="history-text">${item}</span>
                <button class="history-del-btn" onclick="deleteHistoryItem(event, '${item}')">✕</button>
            </div>
        `).join('');
    }

    /* === 智慧配號控制 === */
    function toggleBuilder() {
        triggerHaptic();
        builderActive = !builderActive;
        const panel = document.getElementById('builderPanel');
        const btn = document.getElementById('builderToggleBtn');
        
        panel.style.display = builderActive ? 'flex' : 'none';
        
        if (builderActive) {
            btn.classList.add('active');
            renderPills();
            prevValidRaw = input.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
        } else {
            btn.classList.remove('active');
        }
        updateAnalysis();
    }

    function toggleStar(starName) {
        triggerHaptic();
        if (activeStars.includes(starName)) {
            activeStars = activeStars.filter(s => s !== starName);
        } else {
            activeStars.push(starName);
        }
        renderPills();
        updateAnalysis();
    }

    function renderPills() {
        const container = document.getElementById('starPills');
        container.innerHTML = Object.keys(stars).map(s => {
            const isActive = activeStars.includes(s);
            if (isActive) {
                let bg = (s === '絕命') ? 'var(--text-primary)' : stars[s].color;
                let tc = (s === '絕命') ? 'var(--bg-color)' : '#FFF';
                return `<div class="pill" style="background:${bg}; color:${tc};" onclick="toggleStar('${s}')">${s}</div>`;
            } else {
                return `<div class="pill inactive" onclick="toggleStar('${s}')">${s}</div>`;
            }
        }).join('');
    }

    input.addEventListener('input', () => {
        clearBtn.style.display = input.value.length > 0 ? 'flex' : 'none';
        updateAnalysis();
    });

    function clearInput() {
        triggerHaptic();
        input.value = '';
        prevValidRaw = '';
        clearBtn.style.display = 'none';
        updateAnalysis();
        input.focus();
    }

    function setCopyMode(mode) {
        triggerHaptic();
        currentMode = mode;
        formattedDisplay.innerText = currentCopyTexts[mode] || '';
    }

    /* === 核心運算 === */
    function updateAnalysis() {
        let rawStr = input.value.toUpperCase();
        let cleanedRaw = rawStr.replace(/[^A-Z0-9]/g, ''); 

        clearTimeout(saveHistoryTimeout);
        if (rawStr.length >= 2) {
            saveHistoryTimeout = setTimeout(() => {
                saveToHistory(rawStr);
            }, 1500);
        }

        if (builderActive && cleanedRaw.length > 0) {
            let maxLen = parseInt(document.getElementById('builderMaxLen').value) || 20;
            if (cleanedRaw.length > maxLen) {
                showToast(`⚠️ 已達設定字數上限 (${maxLen}字)`);
                cleanedRaw = prevValidRaw; 
                input.value = cleanedRaw; 
            }
        }

        let convertedVal = cleanedRaw.split('').map(char => /[A-Z]/.test(char) ? letterMap[char] : char).join('');
        let pairs = getPairs(convertedVal);

        if (builderActive && pairs.length > 0) {
            let violatedStar = null;
            for (let p of pairs) {
                let star = getStarDetail(p);
                if (star && !activeStars.includes(star.name)) {
                    violatedStar = star.name;
                    break;
                }
            }
            if (violatedStar) {
                showToast(`🚫 過濾攔截：產生了【${violatedStar}】`);
                cleanedRaw = prevValidRaw;
                input.value = cleanedRaw;
                convertedVal = cleanedRaw.split('').map(char => /[A-Z]/.test(char) ? letterMap[char] : char).join('');
                pairs = getPairs(convertedVal);
            }
        }

        prevValidRaw = cleanedRaw; 

        if (cleanedRaw.length < 2) { 
            list.innerHTML = ""; formattedDisplay.innerText = "";
            statsArea.style.display = "none"; previewContainer.style.display = "none"; 
            conversionHint.style.display = "none"; 
            currentCopyTexts = { ai: '', client: '', numbers: '' };
            renderSuggestions(convertedVal); 
            return; 
        }

        if (cleanedRaw !== convertedVal) {
            conversionHint.innerText = `💡 字母自動轉換：${cleanedRaw} ➔ ${convertedVal}`;
            conversionHint.style.display = "block";
        } else {
            conversionHint.style.display = "none";
        }

        renderList(pairs);
        generateDataAndStats(cleanedRaw, convertedVal, pairs);
        renderSuggestions(convertedVal);
    }

    /* === 修復過後的正確分組演算法 === */
    function getPairs(val) {
        let pairs = [];
        if (!val || val.length === 0) return pairs;
        
        // 1. 紀錄所有「有效數字（1-4, 6-9）」的索引位置
        let normalIndices = [];
        for (let i = 0; i < val.length; i++) {
            if (val[i] !== '0' && val[i] !== '5') {
                normalIndices.push(i);
            }
        }

        // 2. 特殊情況處理：若沒有有效數字，或只有一個有效數字
        if (normalIndices.length === 0) return pairs; 
        if (normalIndices.length === 1) {
            pairs.push(val); // 整個字串只當作一個獨立數字處理 (觸發單獨數字的伏位機制)
            return pairs;
        }

        // 3. 在相鄰的有效數字之間精準切割
        for (let k = 0; k < normalIndices.length - 1; k++) {
            // 第一組會涵蓋開頭可能有的前綴 0 或 5
            let sliceStart = (k === 0) ? 0 : normalIndices[k];
            
            // 最後一組會涵蓋結尾可能有的後綴 0 或 5
            // 非最後一組則精準切到下一個有效數字
            let sliceEnd = (k === normalIndices.length - 2) ? val.length : normalIndices[k + 1] + 1;
            
            pairs.push(val.substring(sliceStart, sliceEnd));
        }
        return pairs;
    }

    function appendChar(char) {
        triggerHaptic();
        input.value += char;
        clearBtn.style.display = 'flex';
        updateAnalysis();
    }

    function renderSuggestions(convertedVal) {
        const sugBox = document.getElementById('builderSuggestions');
        if (!builderActive || convertedVal.length === 0) {
            sugBox.style.display = 'none'; return;
        }
        
        let coreDigits = convertedVal.replace(/[05]/g, '');
        let lastCore = coreDigits.length > 0 ? coreDigits.slice(-1) : null;
        
        if (lastCore) {
            let allowedNums = [];
            [1,2,3,4,6,7,8,9].forEach(n => {
                let testPair = lastCore + n;
                let s = getStarDetail(testPair);
                if (s && activeStars.includes(s.name)) allowedNums.push({ num: n, star: s.name });
            });

            if (allowedNums.length > 0) {
                let numBtns = allowedNums.map(item => {
                    let c = stars[item.star].color === 'var(--text-primary)' ? 'inherit' : stars[item.star].color;
                    return `<span class="suggest-btn" style="color:${c};" onclick="appendChar('${item.num}')">${item.num} (${item.star})</span>`;
                }).join('');

                let lettersForNum = {};
                Object.keys(letterMap).forEach(L => {
                    let val = letterMap[L];
                    if (!lettersForNum[val]) lettersForNum[val] = [];
                    lettersForNum[val].push(L);
                });

                let letterBtns = allowedNums.map(item => {
                    return lettersForNum[item.num].map(L => `<span class="suggest-btn" onclick="appendChar('${L}')">${L}</span>`).join('');
                }).join('');
                
                sugBox.innerHTML = `💡 <b>點擊直接插入推薦數字：</b><br>${numBtns}<br><br>🔠 <b>點擊直接插入推薦字母：</b><br>${letterBtns}`;
                sugBox.style.display = 'block';
            } else {
                sugBox.innerHTML = `⚠️ 無法接續任何您勾選的磁場條件`;
                sugBox.style.display = 'block';
            }
        } else {
            sugBox.innerHTML = `請輸入起始數字...`;
            sugBox.style.display = 'block';
        }
    }

    function getStarDetail(p) {
        let clean = p.replace(/[05]/g, '');
        if (clean.length === 0) return null;
        if (clean.length === 1) clean = clean + clean; 
        if (clean.length > 2) clean = clean[0] + clean[clean.length - 1];

        for (let s in stars) {
            for (let lvl in stars[s].levels) {
                if (stars[s].levels[lvl].includes(clean)) return { name: s, coreNum: clean, level: lvl, color: stars[s].color, type: stars[s].type };
            }
        }
        return null;
    }

    function getSmartModifierUI(p) {
        let zeroCount = (p.match(/0/g) || []).length; 
        let fiveCount = (p.match(/5/g) || []).length;
        let parts = [];
        if (fiveCount === 1) parts.push("5顯"); else if (fiveCount > 1) parts.push(fiveCount + "重5顯");
        if (zeroCount === 1) parts.push("0隱"); else if (zeroCount > 1) parts.push(zeroCount + "重0隱");
        return parts.length > 0 ? parts.join(' ') : "";
    }

    function renderList(pairs) {
        list.innerHTML = pairs.map(p => {
            const star = getStarDetail(p); 
            const modifierUI = getSmartModifierUI(p);
            const starColor = star ? star.color : 'var(--text-tertiary)';
            return `
                <div class="result-item" onclick="this.classList.toggle('expanded')" style="border-left: 4px solid ${starColor};">
                    <div class="card-row top-row">
                        <span class="num-tag">${p}</span>${modifierUI ? `<span class="num-modifier">${modifierUI}</span>` : ''}
                    </div>
                    <div class="card-row">
                        <span class="star-name">${star ? star.name : '未知'}${star ? `<span class="star-level">${star.level}</span>` : ''}</span>
                        <span class="star-type" style="color:${starColor};">${star ? star.type : '?'}</span>
                    </div>
                </div>`;
        }).join('');
    }

    function generateDataAndStats(originalStr, convertedStr, pairs) {
        let validStars = [], luckyCount = 0, unluckyCount = 0, aiItems = [], clientItems = [], numItems = [];

        pairs.forEach(p => {
            const star = getStarDetail(p);
            if (star) {
                validStars.push(star);
                if (star.type === "吉") luckyCount++; else if (star.type === "凶") unluckyCount++;
            }
            const starName = star ? star.name : "未知"; const coreNum = star ? star.coreNum : p;
            const level = star ? `-${star.level}` : ''; 
            
            const modifierUI = getSmartModifierUI(p);
            const modifierCopy = modifierUI ? `(${modifierUI})` : '';
            
            aiItems.push(`${starName}${coreNum}${level}${modifierCopy ? ' ' + modifierCopy : ''} [${p}]`);
            clientItems.push(`${starName}(${star ? star.type : '?'})`);
            numItems.push(p);
        });

        let total = luckyCount + unluckyCount;
        let luckyPct = total > 0 ? Math.round((luckyCount / total) * 100) : 0;
        let unluckyPct = total > 0 ? Math.round((unluckyCount / total) * 100) : 0;
        let ratioText = total > 0 ? `吉 ${luckyPct}% / 凶 ${unluckyPct}%` : "無";

        let flowText = "無";
        if (validStars.length >= 2) flowText = `${validStars[0].name} ➔ ${validStars[validStars.length - 1].name}`;
        else if (validStars.length === 1) flowText = `單一 (${validStars[0].name})`;

        let statsString = `📊 統計：${ratioText}\n🔄 流向：${flowText}`;
        let headerDisplay = (originalStr !== convertedStr) ? `${originalStr} ➔ ${convertedStr}` : originalStr;

        currentCopyTexts = {
            ai: `${headerDisplay} ➔ ${aiItems.join(' + ')}\n\n${statsString}`,
            client: `${headerDisplay} ➔ ${clientItems.join(' ➔ ')}\n\n${statsString}`,
            numbers: numItems.join(', ')
        };

        if (total > 0) {
            statsArea.style.display = "flex"; previewContainer.style.display = "block"; 
            document.getElementById('statRatio').innerText = `📊 ${ratioText}`;
            document.getElementById('statFlow').innerText = `🔄 ${flowText}`;
        } else {
            statsArea.style.display = "none"; previewContainer.style.display = "none"; 
        }
        formattedDisplay.innerText = currentCopyTexts[currentMode];
    }

    function showToast(message) {
        const existingToast = document.getElementById('ios-toast');
        if (existingToast) existingToast.remove();
        const toast = document.createElement('div');
        toast.id = 'ios-toast'; toast.className = 'toast-message'; toast.innerHTML = message;
        document.body.appendChild(toast);
        requestAnimationFrame(() => toast.classList.add('show'));
        setTimeout(() => { toast.classList.remove('show'); toast.addEventListener('transitionend', () => toast.remove()); }, 2000);
    }

    function copyResult() {
        triggerHaptic();
        const text = formattedDisplay.innerText;
        if (!text) { showToast('⚠️ 請先輸入有效號碼'); return; }
        if (navigator.clipboard && window.isSecureContext) {
            navigator.clipboard.writeText(text).then(() => showToast('✅ 已成功複製到剪貼簿')).catch(() => fallbackCopyTextToClipboard(text));
        } else fallbackCopyTextToClipboard(text);
    }

    function fallbackCopyTextToClipboard(text) {
        let textArea = document.createElement("textarea"); textArea.value = text;
        textArea.style.position = "fixed"; textArea.style.top = "-999999px"; textArea.style.left = "-999999px";
        document.body.appendChild(textArea); textArea.focus(); textArea.select();
        try { document.execCommand('copy'); showToast('✅ 已成功複製到剪貼簿'); } catch (err) { showToast('❌ 複製失敗，請手動複製文字'); }
        textArea.remove();
    }
</script>
