<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>八星磁場分析 - Apple Pro Edition</title>
    <style>
        /* === 定義顏色變數 (預設 Light Mode) === */
        :root {
            --bg-color: #F2F2F7; 
            --card-bg: #FFFFFF;
            --accent-color: #007AFF; 
            --text-primary: #1C1C1E;
            --text-secondary: #8E8E93;
            --text-tertiary: #C7C7CC;
            --divider-color: rgba(60, 60, 67, 0.1);
            --input-bg: rgba(118, 118, 128, 0.08);
            --picker-bg: rgba(118, 118, 128, 0.12);
            --preview-bg: rgba(255, 255, 255, 0.5); 
            --footer-bg: rgba(242, 242, 247, 0.85);
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.05), 0 2px 8px rgba(0,0,0,0.04);
            --shadow-lg: 0 -4px 20px rgba(0,0,0,0.06);
            --shadow-inset: inset 0 1px 4px rgba(0,0,0,0.06);
            --hint-bg: rgba(0, 122, 255, 0.1); /* 轉換提示背景 */
        }

        /* === 深色模式變數 (手動切換) === */
        [data-theme="dark"] {
            --bg-color: #000000;
            --card-bg: #1C1C1E;
            --text-primary: #FFFFFF;
            --text-secondary: #8E8E93;
            --text-tertiary: #48484A;
            --divider-color: rgba(84, 84, 88, 0.65);
            --input-bg: rgba(118, 118, 128, 0.24);
            --picker-bg: rgba(118, 118, 128, 0.24);
            --preview-bg: rgba(0, 0, 0, 0.3); 
            --footer-bg: rgba(0, 0, 0, 0.85);
            --shadow-sm: 0 1px 4px rgba(0,0,0,0.2);
            --shadow-lg: 0 -4px 24px rgba(0,0,0,0.4);
            --shadow-inset: inset 0 1px 5px rgba(0,0,0,0.4);
            --hint-bg: rgba(10, 132, 255, 0.15); /* 轉換提示暗黑背景 */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            display: flex;
            justify-content: center;
            height: 100vh; 
            height: 100dvh; 
            overflow: hidden; 
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .app-container {
            width: 100%;
            max-width: 440px;
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
        }

        /* 主題切換按鈕 */
        .theme-toggle {
            position: absolute;
            top: 14px;
            right: 16px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--input-bg);
            border: none;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 16px;
            cursor: pointer;
            z-index: 20;
            transition: transform 0.2s;
        }
        .theme-toggle:active { transform: scale(0.9); }

        /* ========== 頂部固定區 (Header & Input) ========== */
        .top-section {
            flex-shrink: 0;
            padding: 16px 16px 8px 16px;
            background: var(--bg-color);
            z-index: 10;
        }

        .header { 
            display: flex; 
            align-items: baseline; 
            justify-content: center; /* 標題置中 */
            gap: 8px;
            margin-bottom: 12px; 
            margin-top: 4px;
        }
        .header h1 { font-size: 20px; font-weight: 700; letter-spacing: 0.3px; margin: 0; }
        .header p { color: var(--text-secondary); font-size: 11px; font-weight: 500; margin: 0; }

        .input-card {
            background: var(--card-bg);
            padding: 8px;
            border-radius: 14px;
            box-shadow: var(--shadow-sm);
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        input {
            width: 100%;
            border: none;
            background: var(--input-bg);
            padding: 12px 36px 12px 12px; 
            font-size: 22px;
            border-radius: 10px;
            outline: none;
            text-align: center;
            font-weight: 600;
            color: var(--text-primary);
            transition: background 0.2s;
        }
        input:focus { filter: brightness(0.95); }
        input::placeholder { color: #A1A1A6; font-weight: 500; }

        /* 清除按鈕 */
        .clear-btn {
            position: absolute;
            right: 10px;
            width: 22px;
            height: 22px;
            background: var(--text-tertiary);
            color: #FFF;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: none; 
            user-select: none;
        }

        /* ========== 中間滑動區 (網格與統計) ========== */
        .scroll-area {
            flex-grow: 1;
            overflow-y: auto;
            padding: 4px 16px;
            scrollbar-width: none;
        }
        .scroll-area::-webkit-scrollbar { display: none; }

        /* 英文字母轉換提示 */
        .conversion-hint {
            font-size: 12px;
            color: var(--accent-color);
            background: var(--hint-bg);
            padding: 8px 12px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 12px;
            font-weight: 600;
            display: none; /* 預設隱藏，有英文字母才顯示 */
        }

        /* 迷你卡片排版 */
        #resultList {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 12px;
        }

        .result-item {
            background: var(--card-bg);
            padding: 8px 10px;
            border-radius: 10px;
            box-shadow: var(--shadow-sm);
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 2px;
        }

        .card-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            width: 100%;
        }

        .num-tag { font-size: 16px; font-weight: 700; color: var(--text-primary); }
        .num-modifier { font-size: 10px; color: var(--accent-color); font-weight: 600; margin-left: 4px; }
        .star-name { font-size: 13px; font-weight: 600; color: var(--text-secondary); display: flex; align-items: baseline; gap: 4px; }
        .star-level { font-size: 10px; font-weight: 500; opacity: 0.8; }
        .star-type { font-size: 11px; font-weight: 700; }

        /* 單行統計卡片 */
        .stats-card {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: var(--shadow-sm);
            padding: 12px 14px;
            display: none;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            font-size: 12px;
            font-weight: 600;
        }
        .stats-text-primary { color: var(--text-primary); }
        .stats-text-secondary { color: var(--text-secondary); }

        /* ========== 底部操作區 (Footer) ========== */
        .footer-action {
            flex-shrink: 0; 
            padding: 10px 16px calc(10px + env(safe-area-inset-bottom)) 16px; 
            background: var(--footer-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--divider-color);
            display: flex;
            flex-direction: column;
            gap: 8px; 
            box-shadow: var(--shadow-lg);
            z-index: 10;
        }

        /* 橫向排列：下拉選單 + 複製按鈕 */
        .action-row {
            display: flex;
            gap: 8px;
            width: 100%;
            align-items: stretch; 
            height: 44px; 
        }

        /* 下拉選單樣式 */
        .select-wrapper {
            position: relative;
            flex: 1; 
            min-width: 0;
        }
        .mode-select {
            width: 100%;
            height: 100%;
            background: var(--picker-bg);
            color: var(--text-primary);
            border: none;
            padding: 0 30px 0 14px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            appearance: none;
            -webkit-appearance: none;
            text-align: left;
            outline: none;
            cursor: pointer;
        }
        .select-wrapper::after {
            content: '▼';
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 10px;
            color: var(--text-secondary);
            pointer-events: none;
        }

        /* 縮小版複製按鈕 */
        .copy-btn {
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            width: 90px; 
            flex-shrink: 0;
            transition: transform 0.1s, background-color 0.2s;
        }
        .copy-btn:active { transform: scale(0.95); background: #0062CC; }

        /* 高顏值代碼預覽框 */
        .preview-box {
            background: var(--preview-bg);
            border: 1px solid var(--divider-color);
            border-radius: 8px;
            padding: 8px 10px;
            max-height: 54px; 
            overflow-y: auto; 
            box-shadow: var(--shadow-inset); 
            display: none; 
        }
        .preview-text {
            font-size: 11px; 
            color: var(--text-primary); 
            font-weight: 500; 
            line-height: 1.4;
            white-space: pre-wrap;
            word-break: break-all;
            text-align: left; 
        }

        /* ========== iOS 風格 Toast 提示框 ========== */
        .toast-message {
            position: fixed;
            top: 40%; 
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: rgba(28, 28, 30, 0.85); 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: #FFFFFF;
            padding: 14px 20px;
            border-radius: 16px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            z-index: 9999;
            opacity: 0;
            pointer-events: none; 
            white-space: nowrap;
            transition: opacity 0.3s cubic-bezier(0.25, 0.1, 0.25, 1), transform 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
        }
        .toast-message.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }
    </style>
</head>
<body>

<div class="app-container">
    <!-- 主題切換按鈕 -->
    <button class="theme-toggle" id="themeToggleBtn" onclick="toggleTheme()">🌙</button>

    <div class="top-section">
        <div class="header">
            <h1>數字磁場分析</h1>
            <p>Pro Edition</p>
        </div>
        <div class="input-card">
            <div class="input-wrapper">
                <!-- 更新提示字，暗示可輸入英文或混合 -->
                <input type="text" id="numInput" placeholder="支援電話號碼/英文名/車牌 (如 MA34138658)" maxlength="20" value="">
                <div class="clear-btn" id="clearBtn" onclick="clearInput()">✕</div>
            </div>
        </div>
    </div>

    <div class="scroll-area">
        <!-- 英文轉換提示區域 -->
        <div id="conversionHint" class="conversion-hint"></div>

        <div id="resultList"></div>
        
        <!-- 單行統計卡片 -->
        <div id="statsArea" class="stats-card">
            <span class="stats-text-primary" id="statRatio">📊 吉 0% / 凶 0%</span>
            <span class="stats-text-secondary" id="statFlow">🔄 -</span>
        </div>
    </div>

    <div class="footer-action" id="copyArea">
        <!-- 橫向排列：選單與按鈕 -->
        <div class="action-row">
            <div class="select-wrapper">
                <select id="modeSelect" class="mode-select" onchange="setCopyMode(this.value)">
                    <option value="ai">模式：AI 專業</option>
                    <option value="client">模式：客戶簡報</option>
                    <option value="numbers">模式：純數字</option>
                </select>
            </div>
            <button class="copy-btn" onclick="copyResult()">複製</button>
        </div>
        
        <!-- 隱藏式高顏值預覽框 -->
        <div id="previewContainer" class="preview-box">
            <div id="formattedText" class="preview-text"></div>
        </div>
    </div>
</div>

<script>
    // 磁場資料庫
    const stars = {
        "天醫": { levels: { "1級": ["13","31"], "2級": ["68","86"], "3級": ["49","94"], "4級": ["27","72"] }, color: "#FF2D55", type: "吉" },
        "生氣": { levels: { "1級": ["14","41"], "2級": ["67","76"], "3級": ["39","93"], "4級": ["28","82"] }, color: "#34C759", type: "吉" },
        "延年": { levels: { "1級": ["19","91"], "2級": ["78","87"], "3級": ["34","43"], "4級": ["26","62"] }, color: "#FF9500", type: "吉" },
        "伏位": { levels: { "1級": ["11","22"], "2級": ["88","99"], "3級": ["66","77"], "4級": ["33","44"] }, color: "#32ADE6", type: "吉" },
        "絕命": { levels: { "1級": ["12","21"], "2級": ["69","96"], "3級": ["48","84"], "4級": ["37","73"] }, color: "var(--text-primary)", type: "凶" },
        "五鬼": { levels: { "1級": ["18","81"], "2級": ["79","97"], "3級": ["36","63"], "4級": ["24","42"] }, color: "#5856D6", type: "凶" },
        "六煞": { levels: { "1級": ["16","61"], "2級": ["47","74"], "3級": ["38","83"], "4級": ["29","92"] }, color: "#AF52DE", type: "凶" },
        "禍害": { levels: { "1級": ["17","71"], "2級": ["89","98"], "3級": ["46","64"], "4級": ["23","32"] }, color: "#FFCC00", type: "凶" }
    };

    // 畢達哥拉斯 1-9 英文字母對應表
    const letterMap = {
        'A':1, 'B':2, 'C':3, 'D':4, 'E':5, 'F':6, 'G':7, 'H':8, 'I':9,
        'J':1, 'K':2, 'L':3, 'M':4, 'N':5, 'O':6, 'P':7, 'Q':8, 'R':9,
        'S':1, 'T':2, 'U':3, 'V':4, 'W':5, 'X':6, 'Y':7, 'Z':8
    };

    const input = document.getElementById('numInput');
    const clearBtn = document.getElementById('clearBtn');
    const list = document.getElementById('resultList');
    const statsArea = document.getElementById('statsArea');
    const previewContainer = document.getElementById('previewContainer');
    const formattedDisplay = document.getElementById('formattedText');
    const conversionHint = document.getElementById('conversionHint');
    
    let currentMode = 'ai'; 
    let currentCopyTexts = { ai: '', client: '', numbers: '' };

    // 主題切換
    function toggleTheme() {
        triggerHaptic();
        const html = document.documentElement;
        const currentTheme = html.getAttribute('data-theme');
        const btn = document.getElementById('themeToggleBtn');
        
        if (currentTheme === 'dark') {
            html.removeAttribute('data-theme');
            btn.innerHTML = '🌙'; 
        } else {
            html.setAttribute('data-theme', 'dark');
            btn.innerHTML = '☀️'; 
        }
    }

    // 監聽輸入事件
    input.addEventListener('input', () => {
        clearBtn.style.display = input.value.length > 0 ? 'flex' : 'none';
        updateAnalysis();
    });

    function clearInput() {
        triggerHaptic();
        input.value = '';
        clearBtn.style.display = 'none';
        updateAnalysis();
        input.focus();
    }

    function triggerHaptic() {
        if (window.navigator && window.navigator.vibrate) {
            window.navigator.vibrate(10);
        }
    }

    function setCopyMode(mode) {
        triggerHaptic();
        currentMode = mode;
        formattedDisplay.innerText = currentCopyTexts[mode] || '';
    }

    /* === 核心演算法 + 英文轉換支援 === */
    function updateAnalysis() {
        // 將輸入全轉大寫，並剔除英文與數字以外的符號
        const rawStr = input.value.toUpperCase();
        const cleanedRaw = rawStr.replace(/[^A-Z0-9]/g, '');

        if (cleanedRaw.length < 2) { 
            list.innerHTML = ""; 
            formattedDisplay.innerText = "";
            statsArea.style.display = "none";
            previewContainer.style.display = "none"; 
            conversionHint.style.display = "none"; // 隱藏轉換提示
            currentCopyTexts = { ai: '', client: '', numbers: '' };
            return; 
        }

        // 轉換邏輯：字母轉數字，數字保留
        const convertedVal = cleanedRaw.split('').map(char => {
            if (/[A-Z]/.test(char)) return letterMap[char];
            return char;
        }).join('');

        // 若有包含英文被轉換，顯示提示 UI
        if (cleanedRaw !== convertedVal) {
            conversionHint.innerText = `💡 字母自動轉換：${cleanedRaw} ➔ ${convertedVal}`;
            conversionHint.style.display = "block";
        } else {
            conversionHint.style.display = "none";
        }

        let pairs = [];
        let i = 0;
        
        // 滑動視窗拆解 (針對轉換後的數字 val)
        const val = convertedVal;
        while (i < val.length - 1) {
            let j = i;
            let normalCount = 0;
            let chunk = "";
            
            while (j < val.length && normalCount < 2) {
                if (val[j] !== '0' && val[j] !== '5') normalCount++;
                chunk += val[j];
                if (normalCount === 2) break;
                j++;
            }
            
            if (normalCount === 2) {
                pairs.push(chunk);
                i = j;
            } else if (normalCount === 1 && j === val.length) {
                if (pairs.length > 0) {
                    let lastPair = pairs.pop();
                    pairs.push(lastPair.substring(0, lastPair.length - 1) + chunk);
                } else {
                    pairs.push(chunk);
                }
                break;
            } else {
                break;
            }
        }

        renderList(pairs);
        // 將原始輸入(cleanedRaw)與轉換後數字(convertedVal)一併傳入處理
        generateDataAndStats(cleanedRaw, convertedVal, pairs);
    }

    function getStarDetail(p) {
        let clean = p.replace(/[05]/g, '');
        if (clean.length === 0) return null;
        if (clean.length === 1) clean = clean + clean; 
        if (clean.length > 2) clean = clean[0] + clean[clean.length - 1];

        for (let s in stars) {
            for (let lvl in stars[s].levels) {
                if (stars[s].levels[lvl].includes(clean)) {
                    return { name: s, coreNum: clean, level: lvl, color: stars[s].color, type: stars[s].type };
                }
            }
        }
        return null;
    }

    function getSmartModifier(p) {
        let zeroCount = (p.match(/0/g) || []).length;
        let fiveCount = (p.match(/5/g) || []).length;
        let parts = [];
        
        if (fiveCount === 1) parts.push("5顯");
        else if (fiveCount === 2) parts.push("雙5顯");
        else if (fiveCount > 2) parts.push(fiveCount + "重5顯");
        
        if (zeroCount === 1) parts.push("0隱");
        else if (zeroCount === 2) parts.push("雙0隱");
        else if (zeroCount > 2) parts.push(zeroCount + "重0隱");
        
        return parts.length > 0 ? `(${parts.join('')})` : "";
    }

    function renderList(pairs) {
        list.innerHTML = pairs.map(p => {
            const star = getStarDetail(p);
            const modifier = getSmartModifier(p);
            const starColor = star ? star.color : 'var(--text-tertiary)';

            return `
                <div class="result-item" style="border-left: 4px solid ${starColor};">
                    <div class="card-row">
                        <span class="num-tag">${p}</span>
                        ${modifier ? `<span class="num-modifier">${modifier}</span>` : ''}
                    </div>
                    <div class="card-row" style="margin-top: 4px;">
                        <span class="star-name">${star ? star.name : '未知'}${star ? `<span class="star-level">${star.level}</span>` : ''}</span>
                        <span class="star-type" style="color:${starColor};">${star ? star.type : '?'}</span>
                    </div>
                </div>
            `;
        }).join('');
    }

    function generateDataAndStats(originalStr, convertedStr, pairs) {
        let validStars = [];
        let luckyCount = 0;
        let unluckyCount = 0;

        let aiItems = [];
        let clientItems = [];
        let numItems = [];

        pairs.forEach(p => {
            const star = getStarDetail(p);
            if (star) {
                validStars.push(star);
                if (star.type === "吉") luckyCount++;
                else if (star.type === "凶") unluckyCount++;
            }

            const starName = star ? star.name : "未知";
            const coreNum = star ? star.coreNum : p;
            const level = star ? `-${star.level}` : '';
            const modifier = getSmartModifier(p);

            aiItems.push(`${starName}${coreNum}${level}${modifier ? ' ' + modifier : ''} [${p}]`);
            clientItems.push(`${starName}(${star ? star.type : '?'})`);
            numItems.push(p);
        });

        let total = luckyCount + unluckyCount;
        let luckyPct = total > 0 ? Math.round((luckyCount / total) * 100) : 0;
        let unluckyPct = total > 0 ? Math.round((unluckyCount / total) * 100) : 0;
        let ratioText = total > 0 ? `吉 ${luckyPct}% / 凶 ${unluckyPct}%` : "無";

        let flowText = "無";
        if (validStars.length >= 2) {
            let first = validStars[0];
            let last = validStars[validStars.length - 1];
            flowText = `${first.name} ➔ ${last.name}`;
        } else if (validStars.length === 1) {
            flowText = `單一 (${validStars[0].name})`;
        }

        let statsString = `📊 統計：${ratioText}\n🔄 流向：${flowText}`;
        
        // 若有英文字母轉換，則預覽時顯示「原始 ➔ 轉換後」，否則僅顯示數字
        let headerDisplay = (originalStr !== convertedStr) ? `${originalStr} ➔ ${convertedStr}` : originalStr;

        currentCopyTexts = {
            ai: `${headerDisplay} ➔ ${aiItems.join(' + ')}\n\n${statsString}`,
            client: `${headerDisplay} ➔ ${clientItems.join(' ➔ ')}\n\n${statsString}`,
            numbers: numItems.join(', ')
        };

        if (total > 0) {
            statsArea.style.display = "flex";
            previewContainer.style.display = "block"; 
            document.getElementById('statRatio').innerText = `📊 ${ratioText}`;
            document.getElementById('statFlow').innerText = `🔄 ${flowText}`;
        } else {
            statsArea.style.display = "none";
            previewContainer.style.display = "none"; 
        }

        formattedDisplay.innerText = currentCopyTexts[currentMode];
    }

    /* === Toast 提示 === */
    function showToast(message) {
        const existingToast = document.getElementById('ios-toast');
        if (existingToast) existingToast.remove();

        const toast = document.createElement('div');
        toast.id = 'ios-toast';
        toast.className = 'toast-message';
        toast.innerHTML = message;
        document.body.appendChild(toast);

        requestAnimationFrame(() => toast.classList.add('show'));

        setTimeout(() => {
            toast.classList.remove('show');
            toast.addEventListener('transitionend', () => toast.remove());
        }, 2000);
    }

    /* === 複製功能 === */
    function copyResult() {
        triggerHaptic();
        const text = formattedDisplay.innerText;
        if (!text) {
            showToast('⚠️ 請先輸入有效號碼');
            return;
        }

        if (navigator.clipboard && window.isSecureContext) {
            navigator.clipboard.writeText(text).then(() => {
                showToast('✅ 已成功複製到剪貼簿');
            }).catch(() => fallbackCopyTextToClipboard(text));
        } else {
            fallbackCopyTextToClipboard(text);
        }
    }

    function fallbackCopyTextToClipboard(text) {
        let textArea = document.createElement("textarea");
        textArea.value = text;
        textArea.style.position = "fixed";
        textArea.style.top = "-999999px";
        textArea.style.left = "-999999px";
        document.body.appendChild(textArea);
        
        textArea.focus();
        textArea.select();
        
        try {
            document.execCommand('copy');
            showToast('✅ 已成功複製到剪貼簿');
        } catch (err) {
            showToast('❌ 複製失敗，請手動複製文字');
        }
        textArea.remove();
    }
</script>
</body>
